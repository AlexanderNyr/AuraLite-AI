name: AuraLite CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,lint]'
      - name: Ruff critical lint
        run: ruff check .
      - name: Pyright smoke
        run: pyright || true
      - name: Tests
        run: pytest tests/ -q --tb=line
      - name: Coverage report (non-blocking while legacy monolith is migrated)
        run: pytest tests/ --cov=. --cov-report=term-missing || true
      - name: Benchmark smoke
        run: python benchmarks/benchmark_generation.py --quick || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker build CPU runtime
        run: docker build --target runtime-cpu -t auralite-ai:cpu .
