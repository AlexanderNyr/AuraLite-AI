name: AuraLite CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,lint]'
      - name: Ruff
        run: ruff check .
      - name: Pyright
        run: pyright
      - name: Tests + coverage
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=90
      - name: Benchmark smoke
        run: python benchmarks/benchmark_generation.py --quick || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker build CPU runtime
        run: docker build --target runtime-cpu -t auralite-ai:cpu .
